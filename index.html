<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Rift Arcade v2.0</title>
<style>
:root{--bg:#030613;--panel:rgba(5,10,26,.91);--line:rgba(88,246,255,.28);--cyan:#58f6ff;--pink:#ff4fd8;--gold:#ffe66d;--green:#58ff9a;--red:#ff5b6e;--text:#eaf8ff;--muted:#a8b7da}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 10%,#142653 0,#050817 52%,#01020a 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif}body.contrast{--bg:#000;--panel:#000;--line:#fff;--cyan:#0ff;--pink:#f0f;--gold:#ff0;--green:#0f6;--red:#f34;--text:#fff;--muted:#ddd;background:#000}.wrap{position:fixed;inset:0;display:grid;place-items:center;padding:10px}canvas{width:min(100%,1280px);height:min(72vw,720px);max-height:calc(100vh - 20px);border:1px solid var(--line);border-radius:18px;box-shadow:0 0 44px rgba(88,246,255,.2),inset 0 0 90px rgba(88,246,255,.06);background:#030613;touch-action:none}.hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);width:min(1248px,calc(100% - 20px));display:flex;gap:8px;justify-content:space-between;align-items:center;pointer-events:none;z-index:3;text-shadow:0 0 12px rgba(88,246,255,.75);font-weight:900}.chip{background:rgba(2,5,15,.65);border:1px solid var(--line);border-radius:999px;padding:8px 12px;backdrop-filter:blur(8px);font-size:clamp(10px,2.5vw,14px)}.overlay{position:fixed;inset:0;background:linear-gradient(180deg,rgba(1,2,9,.82),rgba(1,2,9,.38));display:grid;place-items:center;padding:16px;z-index:6}.hidden{display:none!important}.card{width:min(980px,96vw);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:0 0 90px rgba(88,246,255,.18)}h1{font-size:clamp(38px,8vw,82px);line-height:.9;margin:0 0 8px;text-transform:uppercase;letter-spacing:.04em;background:linear-gradient(90deg,var(--cyan),var(--pink),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}h2{font-size:clamp(26px,5vw,44px);margin:4px 0 10px}p{color:var(--muted);line-height:1.55}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:14px 0}.box{border:1px solid rgba(255,255,255,.14);border-radius:16px;background:rgba(255,255,255,.045);padding:12px}.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:10px 0}button,select{cursor:pointer;border:1px solid rgba(255,255,255,.16);border-radius:14px;background:linear-gradient(90deg,var(--cyan),var(--pink));color:#07101f;padding:12px 15px;font-weight:950;text-transform:uppercase;letter-spacing:.065em;box-shadow:0 0 22px rgba(88,246,255,.22)}button.secondary,select{background:rgba(255,255,255,.075);color:var(--text)}button.locked{filter:grayscale(1);opacity:.55}button:focus-visible,select:focus-visible,input:focus-visible{outline:3px solid var(--gold)}kbd{display:inline-block;border:1px solid rgba(255,255,255,.3);border-bottom-width:3px;border-radius:8px;padding:2px 7px;background:#111831;color:#fff;font-weight:900;margin:1px}.muted{font-size:13px;color:var(--muted)}label{display:block}.touch{position:fixed;inset:0;pointer-events:none;z-index:4;display:none}.touch.show{display:block}.pad{position:absolute;left:22px;bottom:22px;width:150px;height:150px;border:1px solid var(--line);border-radius:50%;background:rgba(88,246,255,.06);pointer-events:auto}.nub{position:absolute;left:50%;top:50%;width:56px;height:56px;margin:-28px;border-radius:50%;background:rgba(88,246,255,.28);box-shadow:0 0 18px rgba(88,246,255,.4)}.touchBtns{position:absolute;right:18px;bottom:22px;display:grid;grid-template-columns:repeat(2,78px);gap:10px;pointer-events:auto}.touchBtns button{height:70px;border-radius:22px;font-size:11px;padding:4px}.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(2,5,15,.8);padding:10px 15px;z-index:7}.reduce *{animation:none!important;transition:none!important}@media(max-width:760px){.card{padding:18px}.grid{grid-template-columns:1fr}.touch.show{display:block}.wrap{padding:5px}canvas{border-radius:12px}.hud{top:8px}.chip{padding:6px 8px}}
</style>
</head>
<body>
<div class="wrap"><canvas id="game" width="1280" height="720" aria-label="Neon Rift Arcade game canvas"></canvas></div>
<div class="hud"><div class="chip" id="h1">NEON RIFT v2.0</div><div class="chip" id="h2">MENU</div><div class="chip" id="h3">BEST 0</div></div>
<div class="touch" id="touch"><div class="pad" id="pad"><div class="nub" id="nub"></div></div><div class="touchBtns"><button id="tfire">Pulse</button><button id="tdash">Dash</button><button id="tspecial">Special</button><button id="tpause">Pause</button></div></div>
<div class="toast hidden" id="toast"></div>
<div class="overlay" id="overlay"><div class="card" id="card"></div></div>
<script>
(()=>{'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),W=1280,H=720,overlay=document.getElementById('overlay'),card=document.getElementById('card'),hud1=document.getElementById('h1'),hud2=document.getElementById('h2'),hud3=document.getElementById('h3'),toast=document.getElementById('toast'),touch=document.getElementById('touch'),pad=document.getElementById('pad'),nub=document.getElementById('nub');
const SAVE='neon-rift-arcade-v2',rand=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),hyp=(a,b,c,d)=>Math.hypot(a-c,b-d),keys=new Set();
const WEAPONS={pulse:{name:'Pulse Twin',need:0,desc:'Balanced dual pulse cannons.'},scatter:{name:'Scatter Prism',need:1200,desc:'Wide multi-shot spread.'},lance:{name:'Ion Lance',need:2600,desc:'Fast piercing beam.'},orbit:{name:'Orbit Drone',need:5200,desc:'Auto-firing drone support.'}};
const MODE={campaign:'Campaign',survival:'Survival',boss:'Boss Rush'};
let save=load(),settings={sound:save.sound!==false,music:save.music!==false,contrast:!!save.contrast,reduce:!!save.reduce,touch:!!save.touch,weapon:save.weapon||'pulse',mode:'campaign'},state='menu',last=performance.now(),shake=0,flash=0,scene=0,joy={x:0,y:0},fireHold=false,audio=null,beat=0,beatClock=0;
let G={},P={},A={stars:[],shots:[],hazards:[],enemies:[],parts:[],items:[],rings:[]},pool={shots:[],hazards:[],enemies:[],parts:[],items:[],rings:[]};
function load(){try{return JSON.parse(localStorage.getItem(SAVE)||'{}')}catch{return {}}}
function persist(){localStorage.setItem(SAVE,JSON.stringify({...save,sound:settings.sound,music:settings.music,contrast:settings.contrast,reduce:settings.reduce,touch:settings.touch,weapon:settings.weapon}))}
function css(){document.body.classList.toggle('contrast',settings.contrast);document.body.classList.toggle('reduce',settings.reduce);touch.classList.toggle('show',settings.touch||matchMedia('(pointer:coarse)').matches)}
function tone(f=440,d=.05,type='square',g=.025){if(!settings.sound)return;try{if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)();let o=audio.createOscillator(),n=audio.createGain();o.frequency.value=f;o.type=type;n.gain.value=g;o.connect(n);n.connect(audio.destination);o.start();n.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.stop(audio.currentTime+d)}catch{}}
function musicTick(dt){if(state!=='playing'||!settings.music)return;beatClock-=dt;if(beatClock>0)return;beatClock=18;const seq=[110,146.8,164.8,220,196,164.8,146.8,130.8];tone(seq[beat++%seq.length],.09,'triangle',.011)}
function msg(t){toast.textContent=t;toast.classList.remove('hidden');clearTimeout(msg.id);msg.id=setTimeout(()=>toast.classList.add('hidden'),1800)}
function obj(type,o){let e=pool[type].pop()||{};Object.assign(e,o,{on:true});A[type].push(e);return e}
function clean(type){let a=A[type],p=pool[type];for(let i=a.length-1;i>=0;i--)if(!a[i].on)p.push(a.splice(i,1)[0])}
function setState(s){state=s;overlay.classList.toggle('hidden',s==='playing'||s==='intro');if(s==='menu')menu();if(s==='pause')pause();if(s==='upgrade')upgrade();if(s==='over')over();hud2.textContent=s.toUpperCase()}
function menu(){const best=save.best||0,un=Object.keys(WEAPONS).filter(k=>best>=WEAPONS[k].need);if(!un.includes(settings.weapon))settings.weapon='pulse';card.innerHTML=`<h1>Neon Rift</h1><p>v2.0 adds campaign, survival, boss rush, procedural sprite animation, unlockable weapons, synth music, gamepad support, smarter enemies, checkpoints, and expanded accessibility.</p><div class="grid"><div class="box"><b>Modes</b><br>Campaign · Survival · Boss Rush</div><div class="box"><b>Controls</b><br><kbd>WASD</kbd>/<kbd>Arrows</kbd> move · <kbd>Space</kbd> fire · <kbd>Shift</kbd> dash · <kbd>E</kbd> special · <kbd>P</kbd> pause</div><div class="box"><b>Gamepad</b><br>Left stick move · A/RT fire · B dash · X special</div><div class="box"><b>Best Score</b><br>${best}</div></div><div class="row"><select id="mode">${Object.keys(MODE).map(k=>`<option value="${k}">${MODE[k]}</option>`).join('')}</select><select id="weapon">${Object.keys(WEAPONS).map(k=>`<option value="${k}" ${settings.weapon===k?'selected':''} ${best<WEAPONS[k].need?'disabled':''}>${WEAPONS[k].name}${best<WEAPONS[k].need?' - unlock '+WEAPONS[k].need:''}</option>`).join('')}</select><button id="start">Start</button><button class="secondary" id="full">Fullscreen</button></div><div class="grid"><label class="box"><input id="sound" type="checkbox" ${settings.sound?'checked':''}> Sound FX</label><label class="box"><input id="music" type="checkbox" ${settings.music?'checked':''}> Synth Music</label><label class="box"><input id="contrast" type="checkbox" ${settings.contrast?'checked':''}> High Contrast</label><label class="box"><input id="reduce" type="checkbox" ${settings.reduce?'checked':''}> Reduced Motion</label><label class="box"><input id="touchset" type="checkbox" ${settings.touch?'checked':''}> Touch Controls</label></div><p class="muted">Unlocks are saved locally in this browser. Current weapon: ${WEAPONS[settings.weapon].desc}</p>`;
['sound','music','contrast','reduce','touchset'].forEach(id=>document.getElementById(id).onchange=()=>{settings.sound=document.getElementById('sound').checked;settings.music=document.getElementById('music').checked;settings.contrast=document.getElementById('contrast').checked;settings.reduce=document.getElementById('reduce').checked;settings.touch=document.getElementById('touchset').checked;css();persist()});document.getElementById('mode').onchange=e=>settings.mode=e.target.value;document.getElementById('weapon').onchange=e=>{settings.weapon=e.target.value;persist();menu()};document.getElementById('start').onclick=start;document.getElementById('full').onclick=()=>document.documentElement.requestFullscreen?.()}
function pause(){card.innerHTML=`<h2>Paused</h2><p>${MODE[G.mode]} · Stage ${G.stage} · Score ${G.score} · Shield ${Math.ceil(P.shield)}</p><div class="row"><button id="resume">Resume</button><button class="secondary" id="menu">Main Menu</button></div>`;document.getElementById('resume').onclick=()=>setState('playing');document.getElementById('menu').onclick=()=>setState('menu')}
function upgrade(){const opts=[['shield','Shield Lattice','Restore shield and raise max shield.'],['cool','Charge Coils','Reduce weapon cooldown.'],['dash','Phase Drive','Improve dash cooldown.'],['spec','Rift Core','Strengthen special ability.'],['score','Overclock','Increase score gain.']].sort(()=>Math.random()-.5).slice(0,3);card.innerHTML=`<h2>Stage Clear</h2><p>Choose an upgrade before Stage ${G.stage+1}.</p><div class="grid">${opts.map(o=>`<button data-u="${o[0]}" class="box"><b>${o[1]}</b><br>${o[2]}</button>`).join('')}</div>`;card.querySelectorAll('[data-u]').forEach(b=>b.onclick=()=>{pick(b.dataset.u);setState('playing')})}
function over(){let acc=G.fired?Math.round(G.hit/G.fired*100):0,time=Math.round((performance.now()-G.started)/1000);card.innerHTML=`<h2>Run Complete</h2><p>Score <b>${G.score}</b> · Best <b>${save.best||0}</b></p><div class="grid"><div class="box">Mode<br><b>${MODE[G.mode]}</b></div><div class="box">Stage/Wave<br><b>${G.stage}</b></div><div class="box">Enemies Defeated<br><b>${G.kills}</b></div><div class="box">Bosses Cleared<br><b>${G.bosses}</b></div><div class="box">Accuracy<br><b>${acc}%</b></div><div class="box">Time<br><b>${time}s</b></div></div><div class="row"><button id="again">Play Again</button><button class="secondary" id="menu">Main Menu</button></div>`;document.getElementById('again').onclick=start;document.getElementById('menu').onclick=()=>setState('menu')}
function start(){G={mode:settings.mode,score:0,stage:1,time:0,queue:[],clear:0,kills:0,bosses:0,fired:0,hit:0,started:performance.now(),checkpoint:1,scoreMul:1,rapid:0,combo:1};P={x:150,y:H/2,vx:0,vy:0,shield:125,max:125,cool:0,dash:0,dashCd:0,inv:1,spec:0,u:{shield:0,cool:0,dash:0,spec:0,score:0},weapon:settings.weapon};for(let k of Object.keys(A))A[k].length=0;A.stars=Array.from({length:settings.reduce?80:150},()=>({x:rand(0,W),y:rand(0,H),z:rand(.3,1.45),r:rand(.5,2)}));scriptStage();setState('playing');msg(`${MODE[G.mode]} started`);tone(330,.08,'sawtooth',.04)}
function scriptStage(){G.time=0;G.clear=0;G.queue=[];let s=G.stage,at=70,add=(t,c,g)=>{for(let i=0;i<c;i++)G.queue.push({at:at+i*g,type:t});at+=c*g+45};if(G.mode==='boss'){G.queue.push({at:70,type:'boss'});return}if(G.mode==='survival'){add('runner',4+s,26);add('chaser',Math.max(1,s),48);if(s>1)add('sniper',1+Math.floor(s/2),85);if(s>2)add('shield',1+Math.floor(s/3),90);if(s%4===0)G.queue.push({at:at+30,type:'boss'});return}add('runner',4+s,32);if(s>1)add('floater',2+s,52);if(s>2)add('sniper',2,90);if(s>3)add('shield',2,94);if(s>4)add('splitter',2,100);if(s===3||s===6||s===9)G.queue.push({at:at+60,type:'boss'});if(s>9)G.queue.push({at:at+90,type:'final'})}
function spawn(type,x=W+80,y=rand(86,H-100)){let s=G.stage,e={type,x,y,r:20,vx:-1.6-s*.08,vy:rand(-.5,.5),hp:2+s*.35,max:2+s*.35,fire:rand(80,150),phase:rand(0,9),shield:0,boss:false,ai:'drift'};if(type==='floater')Object.assign(e,{r:24,hp:3+s*.45,max:3+s*.45,vy:rand(-1.2,1.2),ai:'sine'});if(type==='chaser')Object.assign(e,{r:18,hp:2+s*.28,max:2+s*.28,vx:-2.1,ai:'chase'});if(type==='sniper')Object.assign(e,{r:22,hp:3+s*.4,max:3+s*.4,vx:-1.05,fire:55,ai:'hold'});if(type==='shield')Object.assign(e,{r:25,hp:4+s*.5,max:4+s*.5,shield:3+s*.5,ai:'guard'});if(type==='splitter')Object.assign(e,{r:24,hp:4+s*.35,max:4+s*.35,ai:'split'});if(type==='boss'||type==='final')Object.assign(e,{x:W+130,y:H/2,r:type==='final'?70:56,vx:-.75,hp:type==='final'?170+s*12:90+s*10,max:type==='final'?170+s*12:90+s*10,shield:type==='final'?35:18+s*2,boss:true,type,fire:45,ai:'boss'});obj('enemies',e)}
function pick(u){P.u[u]++;if(u==='shield'){P.max+=25;P.shield=clamp(P.shield+60,0,P.max)}if(u==='score')G.scoreMul+=.18;msg('Upgrade installed');G.stage++;G.checkpoint=G.stage;scriptStage()}
function shoot(x,y,a=0,dmg=1,pierce=0,kind='pulse'){if(A.shots.length>190)return;obj('shots',{x,y,vx:13*Math.cos(a),vy:13*Math.sin(a),r:kind==='lance'?4:5,life:kind==='lance'?1.25:1.6,dmg,pierce,kind,on:true});G.fired++}
function fire(){if(P.cool>0)return;let w=P.weapon,cd=Math.max(.08,.22-P.u.cool*.027);if(G.rapid>0)cd*=.62;P.cool=cd;if(w==='scatter'){for(let a of[-.34,-.18,0,.18,.34])shoot(P.x+35,P.y,a,1,0,'pulse')}else if(w==='lance'){shoot(P.x+38,P.y,0,2.2,2,'lance');P.cool=cd*1.45}else{shoot(P.x+36,P.y-10,0);shoot(P.x+36,P.y+10,0)}tone(760,.025,'square',.013)}
function special(){if(P.spec>0)return;P.spec=Math.max(2.2,5.5-P.u.spec*.45);obj('rings',{x:P.x,y:P.y,r:8,max:95+P.u.spec*18,life:.35,c:'#ff4fd8'});for(let e of A.enemies)if(hyp(P.x,P.y,e.x,e.y)<105+P.u.spec*18){hit(e,3+P.u.spec*1.2);e.x+=28}for(let h of A.hazards)if(hyp(P.x,P.y,h.x,h.y)<110)h.on=false;shake+=settings.reduce?0:9;flash=.18;tone(150,.1,'sawtooth',.03)}
function enemyShot(e,spread=0){if(A.hazards.length>140)return;let a=Math.atan2(P.y-e.y,P.x-e.x)+spread;obj('hazards',{x:e.x-18,y:e.y,vx:4.2*Math.cos(a),vy:4.2*Math.sin(a),r:6,life:2.8,dmg:e.boss?14:10})}
function hit(e,dmg){if(e.shield>0){e.shield-=dmg;parts(e.x,e.y,'#58f6ff',5,2);return}e.hp-=dmg;G.hit++;parts(e.x,e.y,e.boss?'#ff4fd8':'#ffe66d',7,3);if(e.hp<=0){e.on=false;G.kills++;let pts=e.boss?1800:e.type==='sniper'?190:e.type==='shield'?230:e.type==='splitter'?210:e.type==='chaser'?140:100;G.combo=Math.min(5,G.combo+.08);G.score+=Math.round(pts*G.scoreMul*G.combo);if(e.boss)G.bosses++;if(e.type==='splitter'){spawn('runner',e.x,e.y-20);spawn('runner',e.x,e.y+20)}if(Math.random()<(.26+(e.boss?.75:0)))item(e.x,e.y);parts(e.x,e.y,e.boss?'#ff4fd8':'#ffe66d',e.boss?46:19,e.boss?8:5);shake+=settings.reduce?0:(e.boss?13:4);tone(e.boss?90:260,.06,'triangle',.022)}}
function item(x,y){let r=Math.random(),type=r<.38?'shield':r<.64?'rapid':r<.84?'score':'spec';obj('items',{x,y,vx:-2,vy:rand(-.9,.9),r:14,type,life:9})}
function parts(x,y,c,n,sp){if(settings.reduce)n=Math.ceil(n*.45);for(let i=0;i<n&&A.parts.length<380;i++)obj('parts',{x,y,vx:rand(-sp,sp),vy:rand(-sp,sp),r:rand(1,4),life:rand(.35,.75),max:.75,c})}
function damage(n){if(P.inv>0)return;P.shield-=n;P.inv=.7;G.combo=1;flash=.22;shake+=settings.reduce?0:9;parts(P.x,P.y,'#ff5b6e',18,5);tone(90,.08,'sawtooth',.04);if(P.shield<=0){save.best=Math.max(save.best||0,G.score);save.unlocked=Object.keys(WEAPONS).filter(k=>(save.best||0)>=WEAPONS[k].need);persist();setState('over')}}
function update(dt){if(state!=='playing')return;G.time+=dt;scene+=dt;musicTick(dt);G.rapid=Math.max(0,G.rapid-dt/60);P.cool=Math.max(0,P.cool-dt/60);P.dash=Math.max(0,P.dash-dt/60);P.dashCd=Math.max(0,P.dashCd-dt/60);P.inv=Math.max(0,P.inv-dt/60);P.spec=Math.max(0,P.spec-dt/60);shake=Math.max(0,shake-dt*.28);flash=Math.max(0,flash-dt/60);
let gp=navigator.getGamepads?.()[0],gx=0,gy=0,gpFire=false;if(gp){gx=Math.abs(gp.axes[0])>.15?gp.axes[0]:0;gy=Math.abs(gp.axes[1])>.15?gp.axes[1]:0;if(gp.buttons[0]?.pressed||gp.buttons[7]?.pressed)gpFire=true;if(gp.buttons[1]?.pressed)dash();if(gp.buttons[2]?.pressed)special()}
while(G.queue.length&&G.queue[0].at<=G.time){spawn(G.queue.shift().type)}
let ax=0,ay=0;if(keys.has('a')||keys.has('arrowleft'))ax--;if(keys.has('d')||keys.has('arrowright'))ax++;if(keys.has('w')||keys.has('arrowup'))ay--;if(keys.has('s')||keys.has('arrowdown'))ay++;ax+=joy.x+gx;ay+=joy.y+gy;let l=Math.hypot(ax,ay)||1,sp=P.dash>0?11.4+P.u.dash*.8:5.2;P.x=clamp(P.x+ax/l*sp*dt,45,W-82);P.y=clamp(P.y+ay/l*sp*dt,64,H-72);if(keys.has(' ')||fireHold||gpFire)fire();if(keys.has('e')||keys.has('c'))special();if(P.weapon==='orbit'&&Math.floor(scene*3)%8===0&&P.cool<.04){let a=scene*.05,x=P.x+Math.cos(a)*48,y=P.y+Math.sin(a)*42;shoot(x,y,0,1.25,0,'pulse')}
