<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Neon Rift Arcade v1.1</title>
<style>
:root{--bg:#040614;--panel:rgba(5,10,25,.88);--cyan:#58f6ff;--pink:#ff4fd8;--gold:#ffe66d;--green:#58ff9a;--red:#ff5b6e;--text:#eaf8ff;--muted:#9fb2dc}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 15%,#12204a 0,#040614 58%,#01020a 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif}body.highContrast{--bg:#000;--panel:#000;--cyan:#00ffff;--pink:#ff00ff;--gold:#ffff00;--green:#00ff66;--red:#ff3344;--text:#fff;--muted:#ddd}.wrap{position:fixed;inset:0;display:grid;place-items:center;padding:14px}canvas{width:min(100%,1280px);height:min(72vw,720px);max-height:calc(100vh - 28px);background:#050713;border:1px solid color-mix(in srgb,var(--cyan) 42%,transparent);border-radius:18px;box-shadow:0 0 42px rgba(88,246,255,.18),inset 0 0 70px rgba(88,246,255,.06);touch-action:none}.hud{position:fixed;left:50%;top:16px;transform:translateX(-50%);width:min(1240px,calc(100% - 32px));display:flex;justify-content:space-between;gap:8px;pointer-events:none;font-weight:900;text-shadow:0 0 12px rgba(88,246,255,.8);z-index:3}.chip{background:rgba(2,5,16,.62);border:1px solid rgba(88,246,255,.28);border-radius:999px;padding:8px 12px;backdrop-filter:blur(8px);font-size:clamp(11px,2.6vw,14px)}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(180deg,rgba(2,3,10,.78),rgba(2,3,10,.34));padding:18px;z-index:6}.hidden{display:none!important}.card{width:min(880px,94vw);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid rgba(88,246,255,.34);border-radius:24px;padding:26px;box-shadow:0 0 90px rgba(88,246,255,.2)}h1{margin:0 0 8px;font-size:clamp(36px,7vw,76px);line-height:.92;letter-spacing:.04em;text-transform:uppercase;background:linear-gradient(90deg,var(--cyan),var(--pink),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}h2{margin:8px 0 10px;font-size:clamp(24px,5vw,42px)}p{line-height:1.55;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin:16px 0}.box{border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:12px;background:rgba(255,255,255,.045)}kbd{display:inline-block;border:1px solid rgba(255,255,255,.28);border-bottom-width:3px;border-radius:8px;padding:2px 7px;background:#111831;color:#fff;font-weight:900;margin:1px}.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.row>*{margin:4px 0}button,select,label.toggle{cursor:pointer;border:1px solid rgba(255,255,255,.12);border-radius:14px;background:linear-gradient(90deg,var(--cyan),var(--pink));color:#07101f;padding:12px 15px;font-weight:950;text-transform:uppercase;letter-spacing:.07em;box-shadow:0 0 22px rgba(88,246,255,.26)}button.secondary,label.toggle,select{background:rgba(255,255,255,.07);color:var(--text)}button:focus-visible,select:focus-visible,label:focus-visible{outline:3px solid var(--gold)}input[type=checkbox]{transform:scale(1.2);margin-right:7px}.upgradeBtn{text-align:left;text-transform:none;letter-spacing:0;min-height:105px}.upgradeBtn b{display:block;color:#fff;font-size:18px;margin-bottom:6px}.muted{font-size:13px;color:var(--muted)}.touch{position:fixed;inset:0;pointer-events:none;z-index:4;display:none}.touch.show{display:block}.pad{position:absolute;left:24px;bottom:24px;width:150px;height:150px;border:1px solid rgba(88,246,255,.26);border-radius:50%;background:rgba(88,246,255,.06);pointer-events:auto;touch-action:none}.nub{position:absolute;left:50%;top:50%;width:56px;height:56px;margin:-28px;border-radius:50%;background:rgba(88,246,255,.25);box-shadow:0 0 18px rgba(88,246,255,.35)}.touchBtns{position:absolute;right:20px;bottom:24px;display:grid;grid-template-columns:repeat(2,76px);gap:10px;pointer-events:auto}.touchBtns button{height:68px;border-radius:22px;padding:4px;font-size:12px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(2,5,16,.8);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:9px 14px;color:var(--text);z-index:5;opacity:.95}.reduced *{transition:none!important;animation:none!important}@media(max-width:760px){.hud{top:10px}.chip{padding:7px 9px}.touch.show{display:block}.card{padding:18px}.grid{grid-template-columns:1fr}.wrap{padding:6px}canvas{border-radius:12px}}
</style>
</head>
<body>
<div class="wrap"><canvas id="game" width="1280" height="720" aria-label="Neon Rift Arcade game canvas"></canvas></div>
<div class="hud"><div class="chip" id="leftHud">SCORE 0</div><div class="chip" id="centerHud">MENU</div><div class="chip" id="rightHud">BEST 0</div></div>
<div class="touch" id="touchLayer"><div class="pad" id="pad"><div class="nub" id="nub"></div></div><div class="touchBtns"><button id="touchFire">Pulse</button><button id="touchDash">Dash</button><button id="touchSurge">Surge</button><button id="touchPause">Pause</button></div></div>
<div class="toast hidden" id="toast"></div>
<div class="overlay" id="overlay"><div class="card" id="card"></div></div>
<script>
(()=>{'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
const overlay=document.getElementById('overlay'),card=document.getElementById('card'),leftHud=document.getElementById('leftHud'),centerHud=document.getElementById('centerHud'),rightHud=document.getElementById('rightHud'),toast=document.getElementById('toast'),touchLayer=document.getElementById('touchLayer'),pad=document.getElementById('pad'),nub=document.getElementById('nub');
const SAVE_KEY='neon-rift-v11';
const keys=new Set(),rand=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),dist=(a,b,c,d)=>Math.hypot(a-c,b-d);
const DIFF={easy:{name:'Easy',mul:.78,shield:130},normal:{name:'Normal',mul:1,shield:110},hard:{name:'Hard',mul:1.28,shield:95},rift:{name:'Rift',mul:1.58,shield:80}};
let audioCtx=null,last=performance.now(),state='menu',shake=0,flash=0,waveClearDelay=0,touchVec={x:0,y:0},holdingFire=false,droneAngle=0;
const pools={shots:[],hazards:[],enemies:[],particles:[],pickups:[],rings:[]};
const A={shots:[],hazards:[],enemies:[],particles:[],pickups:[],rings:[],stars:[]};
let save=loadSave(),settings={difficulty:save.difficulty||'normal',sound:save.sound!==false,reduceMotion:!!save.reduceMotion,highContrast:!!save.highContrast,mobile:!!save.mobile};
let game={score:0,best:save.best||0,wave:1,waveTime:0,queue:[],spawned:0,shotsFired:0,shotsHit:0,enemiesDefeated:0,bosses:0,surges:0,startTime:0,mult:1,rapid:0,multi:0,resting:false};
let player={x:150,y:H/2,vx:0,vy:0,w:34,h:54,shield:110,maxShield:110,cool:0,dash:0,dashCd:0,inv:0,surgeCd:0,upgrade:{cool:0,spread:0,shield:0,dash:0,drone:0,surge:0}};
function loadSave(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||'{}')}catch{return {}}}
function persist(){localStorage.setItem(SAVE_KEY,JSON.stringify({best:game.best||save.best||0,difficulty:settings.difficulty,sound:settings.sound,reduceMotion:settings.reduceMotion,highContrast:settings.highContrast,mobile:settings.mobile}))}
function bodyClasses(){document.body.classList.toggle('highContrast',settings.highContrast);document.body.classList.toggle('reduced',settings.reduceMotion);touchLayer.classList.toggle('show',settings.mobile||matchMedia('(pointer:coarse)').matches)}
function beep(f=440,d=.04,type='square',g=.025){if(!settings.sound)return;try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),gn=audioCtx.createGain();o.frequency.value=f;o.type=type;gn.gain.value=g;o.connect(gn);gn.connect(audioCtx.destination);o.start();gn.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}catch{}}
function note(msg){toast.textContent=msg;toast.classList.remove('hidden');clearTimeout(note.id);note.id=setTimeout(()=>toast.classList.add('hidden'),1800)}
function fromPool(type,obj){const e=pools[type].pop()||{};Object.assign(e,obj,{active:true});A[type].push(e);return e}
function recycle(type){const arr=A[type],pool=pools[type];for(let i=arr.length-1;i>=0;i--)if(!arr[i].active){pool.push(arr.splice(i,1)[0])}}
function cap(type,n){const arr=A[type];while(arr.length>n){arr[0].active=false;recycle(type)}}
function setState(s){state=s;overlay.classList.toggle('hidden',s==='playing');if(s==='menu')renderMenu();if(s==='paused')renderPause();if(s==='upgrade')renderUpgrade();if(s==='over')renderGameOver();centerHud.textContent=s==='playing'?`WAVE ${game.wave}`:s.toUpperCase()}
function renderMenu(){card.innerHTML=`<h1>Neon Rift</h1><p>v1.1 single-file arcade action. Survive scripted waves, choose upgrades, defeat boss drones every 5 waves, and chase your best score.</p><div class="grid"><div class="box"><b>Move</b><br><kbd>WASD</kbd> / <kbd>Arrows</kbd></div><div class="box"><b>Pulse</b><br><kbd>Space</kbd> / click / touch</div><div class="box"><b>Dash</b><br><kbd>Shift</kbd></div><div class="box"><b>Surge</b><br><kbd>E</kbd> close-range shockwave</div><div class="box"><b>Pause</b><br><kbd>P</kbd></div><div class="box"><b>Best</b><br>${save.best||0}</div></div><div class="row"><button id="start">Start Game</button><button class="secondary" id="full">Fullscreen</button><select id="difficulty" aria-label="Difficulty">${Object.keys(DIFF).map(k=>`<option value="${k}" ${settings.difficulty===k?'selected':''}>${DIFF[k].name}</option>`).join('')}</select></div><div class="grid"><label class="box"><input id="sound" type="checkbox" ${settings.sound?'checked':''}> Sound</label><label class="box"><input id="motion" type="checkbox" ${settings.reduceMotion?'checked':''}> Reduced motion</label><label class="box"><input id="contrast" type="checkbox" ${settings.highContrast?'checked':''}> High contrast</label><label class="box"><input id="mobile" type="checkbox" ${settings.mobile?'checked':''}> Touch controls</label></div><p class="muted">Original browser game inspired by classic arcade pacing. All visuals are procedural.</p>`;wireSettings();document.getElementById('start').onclick=startGame;document.getElementById('full').onclick=()=>document.documentElement.requestFullscreen?.()}
function wireSettings(){['difficulty','sound','motion','contrast','mobile'].forEach(id=>{const el=document.getElementById(id);if(!el)return;el.onchange=()=>{settings.difficulty=document.getElementById('difficulty')?.value||settings.difficulty;settings.sound=document.getElementById('sound')?.checked??settings.sound;settings.reduceMotion=document.getElementById('motion')?.checked??settings.reduceMotion;settings.highContrast=document.getElementById('contrast')?.checked??settings.highContrast;settings.mobile=document.getElementById('mobile')?.checked??settings.mobile;bodyClasses();persist()}})}
function renderPause(){card.innerHTML=`<h2>Paused</h2><p>Score ${game.score} · Wave ${game.wave} · Shield ${Math.ceil(player.shield)}</p><div class="row"><button id="resume">Resume</button><button class="secondary" id="menu">Main Menu</button></div>`;document.getElementById('resume').onclick=()=>setState('playing');document.getElementById('menu').onclick=()=>setState('menu')}
const upgrades=[['cool','Pulse Capacitor','Fire pulses faster.'],['spread','Split Prism','Add wider pulse angles.'],['shield','Shield Lattice','Raise max shield and repair.'],['dash','Phase Boots','Shorter dash cooldown and longer dash.'],['drone','Companion Drone','Add an auto-firing support drone.'],['surge','Surge Core','Stronger close-range shockwave.']];
function renderUpgrade(){const options=[...upgrades].sort(()=>Math.random()-.5).slice(0,3);card.innerHTML=`<h2>Wave Cleared</h2><p>Choose one upgrade before entering wave ${game.wave+1}.</p><div class="grid">${options.map(u=>`<button class="upgradeBtn" data-u="${u[0]}"><b>${u[1]}</b>${u[2]}</button>`).join('')}</div>`;card.querySelectorAll('[data-u]').forEach(b=>b.onclick=()=>chooseUpgrade(b.dataset.u))}
function chooseUpgrade(u){player.upgrade[u]++;if(u==='shield'){player.maxShield+=20;player.shield=clamp(player.shield+45,0,player.maxShield)}note(upgrades.find(x=>x[0]===u)[1]+' installed');game.wave++;startWave(game.wave);setState('playing')}
function renderGameOver(){const acc=game.shotsFired?Math.round(game.shotsHit/game.shotsFired*100):0,sec=Math.max(1,Math.round((performance.now()-game.startTime)/1000));card.innerHTML=`<h2>Run Complete</h2><p>Final score: <b>${game.score}</b>. Best score: <b>${game.best}</b>.</p><div class="grid"><div class="box">Wave reached<br><b>${game.wave}</b></div><div class="box">Enemies defeated<br><b>${game.enemiesDefeated}</b></div><div class="box">Bosses cleared<br><b>${game.bosses}</b></div><div class="box">Accuracy<br><b>${acc}%</b></div><div class="box">Surges used<br><b>${game.surges}</b></div><div class="box">Time survived<br><b>${sec}s</b></div></div><div class="row"><button id="again">Restart</button><button class="secondary" id="menu">Main Menu</button></div>`;document.getElementById('again').onclick=startGame;document.getElementById('menu').onclick=()=>setState('menu')}
function startGame(){const d=DIFF[settings.difficulty];game={score:0,best:save.best||0,wave:1,waveTime:0,queue:[],spawned:0,shotsFired:0,shotsHit:0,enemiesDefeated:0,bosses:0,surges:0,startTime:performance.now(),mult:d.mul,rapid:0,multi:0,resting:false};player={x:150,y:H/2,vx:0,vy:0,w:34,h:54,shield:d.shield,maxShield:d.shield,cool:0,dash:0,dashCd:0,inv:1.1,surgeCd:0,upgrade:{cool:0,spread:0,shield:0,dash:0,drone:0,surge:0}};for(const k of Object.keys(A))A[k].length=0;A.stars=Array.from({length:settings.reduceMotion?80:150},()=>({x:rand(0,W),y:rand(0,H),z:rand(.25,1.4),r:rand(.5,2)}));startWave(1);setState('playing');beep(320,.08,'sawtooth',.04)}
function startWave(n){game.waveTime=0;game.queue=[];game.resting=true;waveClearDelay=0;const rest=120;let at=rest;const add=(type,count,gap)=>{for(let i=0;i<count;i++)game.queue.push({at:at+i*gap,type});at+=count*gap+50};if(n%5===0){game.queue.push({at:rest+60,type:'boss'});note('Boss wave incoming')}else{const tier=Math.min(6,Math.floor(n/2));add('runner',4+tier,34);if(n>1)add('floater',2+tier,56);if(n>2)add('sniper',1+Math.floor(n/3),92);if(n>3)add('shielded',1+Math.floor(n/4),100);if(n>4)add('splitter',1+Math.floor(n/5),120);if(n>6)add('chaser',2+Math.floor(n/4),70)}game.queue.sort((a,b)=>a.at-b.at)}
function spawnEnemy(type,x=W+80,y=rand(85,H-100)){const n=game.wave,m=game.mult;let base={type,x,y,vx:-(1.6+n*.07)*m,vy:rand(-.5,.5),hp:2,r:20,phase:rand(0,9),fire:rand(70,140),shield:0,boss:false};if(type==='floater')Object.assign(base,{hp:3+Math.floor(n/3),r:23,vy:rand(-1.2,1.2)});if(type==='brute')Object.assign(base,{hp:8+n,r:31,vx:-1.25*m});if(type==='sniper')Object.assign(base,{hp:3+Math.floor(n/3),r:22,vx:-1.05*m,fire:60});if(type==='shielded')Object.assign(base,{hp:4+Math.floor(n/2),r:24,shield:3+Math.floor(n/4),vx:-1.35*m});if(type==='splitter')Object.assign(base,{hp:4+Math.floor(n/3),r:24,vx:-1.65*m});if(type==='chaser')Object.assign(base,{hp:2+Math.floor(n/4),r:18,vx:-2.2*m});if(type==='boss')Object.assign(base,{x:W+130,y:H/2,hp:85+n*9,r:54,vx:-.8,boss:true,shield:20+n*2,fire:45});base.maxhp=base.hp;fromPool('enemies',base)}
function spawnPickup(x,y){const r=Math.random(),type=r<.4?'shield':r<.67?'rapid':r<.86?'multi':'surge';fromPool('pickups',{x,y,vx:-2,vy:rand(-.8,.8),r:14,type,life:9})}
function shoot(x=player.x+36,y=player.y,ang=0,damage=1){if(A.shots.length>160)return;fromPool('shots',{x,y,vx:12*Math.cos(ang),vy:12*Math.sin(ang),r:5,life:1.55,damage,friendly:true});game.shotsFired++}
function firePlayer(){if(player.cool>0)return;const cd=Math.max(.08,.22-player.upgrade.cool*.028-(game.rapid>0?.08:0));player.cool=cd;shoot(player.x+38,player.y-10,0);shoot(player.x+38,player.y+10,0);for(let i=0;i<player.upgrade.spread;i++){shoot(player.x+35,player.y,-(.11+i*.05));shoot(player.x+35,player.y,.11+i*.05)}if(game.multi>0){shoot(player.x+30,player.y,-.32);shoot(player.x+30,player.y,.32)}beep(760,.025,'square',.014)}
function surge(){if(player.surgeCd>0)return;player.surgeCd=Math.max(2.3,5.8-player.upgrade.surge*.45);game.surges++;const dmg=3+player.upgrade.surge*1.25,rad=92+player.upgrade.surge*12;fromPool('rings',{x:player.x,y:player.y,r:8,max:rad,life:.32,color:'#ff4fd8'});for(const e of A.enemies){if(dist(player.x,player.y,e.x,e.y)<rad+e.r){hitEnemy(e,dmg);e.x+=34}}for(const h of A.hazards)if(dist(player.x,player.y,h.x,h.y)<rad)h.active=false;shake+=settings.reduceMotion?0:8;flash=.18;beep(150,.11,'sawtooth',.035)}
function enemyShot(e,aim=true,spread=0){if(A.hazards.length>130)return;let a=Math.PI;if(aim){a=Math.atan2(player.y-e.y,player.x-e.x)+spread}fromPool('hazards',{x:e.x-18,y:e.y,vx:4.2*Math.cos(a)*game.mult,vy:4.2*Math.sin(a)*game.mult,r:6,life:2.8,damage:e.boss?13:10})}
function hitEnemy(e,dmg){if(e.shield>0){e.shield-=dmg;particles(e.x,e.y,'#58f6ff',6,2);return}e.hp-=dmg;game.shotsHit++;particles(e.x,e.y,e.boss?'#ff4fd8':'#ffe66d',8,3);if(e.hp<=0){e.active=false;game.enemiesDefeated++;let add=e.boss?1500:({runner:90,floater:150,brute:280,sniper:180,shielded:220,splitter:190,chaser:130}[e.type]||100);if(game.multi>0)add*=2;game.score+=Math.round(add*game.mult);if(e.boss)game.bosses++;if(e.type==='splitter'){spawnEnemy('runner',e.x,e.y-18);spawnEnemy('runner',e.x,e.y+18)}if(Math.random()<(.25+(e.boss?.75:0)))spawnPickup(e.x,e.y);particles(e.x,e.y,e.boss?'#ff4fd8':'#ffe66d',e.boss?44:20,e.boss?8:5);shake+=settings.reduceMotion?0:(e.boss?12:4);beep(e.boss?95:260,.06,'triangle',.025)}}
function particles(x,y,color,count,sp){if(settings.reduceMotion)count=Math.ceil(count*.45);for(let i=0;i<count&&A.particles.length<360;i++)fromPool('particles',{x,y,vx:rand(-sp,sp),vy:rand(-sp,sp),r:rand(1,4),life:rand(.35,.75),max:.75,color})}
function update(dt){if(state!=='playing')return;game.waveTime+=dt;game.rapid=Math.max(0,game.rapid-dt);game.multi=Math.max(0,game.multi-dt);player.cool=Math.max(0,player.cool-dt);player.dash=Math.max(0,player.dash-dt);player.dashCd=Math.max(0,player.dashCd-dt);player.inv=Math.max(0,player.inv-dt);player.surgeCd=Math.max(0,player.surgeCd-dt);flash=Math.max(0,flash-dt);shake=Math.max(0,shake-dt*18);
while(game.queue.length&&game.queue[0].at/60<=game.waveTime){spawnEnemy(game.queue.shift().type);game.spawned++}
let ax=0,ay=0;if(keys.has('a')||keys.has('arrowleft'))ax--;if(keys.has('d')||keys.has('arrowright'))ax++;if(keys.has('w')||keys.has('arrowup'))ay--;if(keys.has('s')||keys.has('arrowdown'))ay++;ax+=touchVec.x;ay+=touchVec.y;const l=Math.hypot(ax,ay)||1,sp=player.dash>0?11+player.upgrade.dash*.8:5.2;player.vx=ax/l*sp;player.vy=ay/l*sp;player.x=clamp(player.x+player.vx*dt*1.1,45,W-80);player.y=clamp(player.y+player.vy*dt*1.1,64,H-70);if(keys.has(' ')||holdingFire)firePlayer();if((keys.has('e')||keys.has('c'))&&player.surgeCd<=0)surge();
if(player.upgrade.drone>0){droneAngle+=dt*(.05+.01*player.upgrade.drone);if(Math.floor(game.waveTime*4)%5===0&&player.cool<=.03){const dx=player.x+Math.cos(droneAngle)*42,dy=player.y+Math.sin(droneAngle)*38;shoot(dx,dy,0,1+.15*player.upgrade.drone)}}
for(const s of A.stars){s.x-=s.z*(1.3+game.wave*.03)*dt;if(s.x<0){s.x=W;s.y=rand(0,H);s.z=rand(.25,1.4)}}
for(const b of A.shots){b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt/60;if(b.life<=0||b.x>W+30||b.y<-30||b.y>H+30)b.active=false}
for(const h of A.hazards){h.x+=h.vx*dt;h.y+=h.vy*dt;h.life-=dt/60;if(h.life<=0||h.x<-40||h.x>W+50||h.y<-40||h.y>H+40)h.active=false;if(h.active&&dist(player.x,player.y,h.x,h.y)<24+h.r){h.active=false;damagePlayer(h.damage)}}
for(const e of A.enemies){e.phase+=dt*.05;if(e.type==='chaser'){const a=Math.atan2(player.y-e.y,player.x-e.x);e.vx+=Math.cos(a)*.055*dt;e.vy+=Math.sin(a)*.055*dt;e.vx=clamp(e.vx,-4.2,-1.2);e.vy=clamp(e.vy,-3,3)}e.x+=e.vx*dt;e.y+=Math.sin(e.phase)*(e.boss?.8:e.type==='floater'?1.6:.5)*dt+e.vy*dt;e.y=clamp(e.y,70,H-86);if(e.boss&&e.x>W-175)e.x-=1.8*dt;if(e.x<-100)e.active=false;e.fire-=dt;if(e.fire<=0){if(e.boss){for(const a of[-.24,0,.24])enemyShot(e,true,a);e.fire=34-Math.min(18,game.wave)}else if(e.type==='sniper'){enemyShot(e,true);e.fire=95}else if(e.type==='floater'||e.type==='shielded'){enemyShot(e,true);e.fire=130-rand(0,40)-game.wave*2}else e.fire=999}if(e.active&&dist(player.x,player.y,e.x,e.y)<e.r+24){e.active=false;damagePlayer(e.boss?28:e.type==='brute'?24:16)}}
for(const b of A.shots)if(b.active)for(const e of A.enemies)if(e.active&&dist(b.x,b.y,e.x,e.y)<b.r+e.r){b.active=false;hitEnemy(e,b.damage);break}
for(const p of A.pickups){p.x+=p.vx*dt;p.y+=p.vy*dt+Math.sin(game.waveTime*6+p.x*.02)*.25;p.life-=dt/60;if(p.life<=0||p.x<-35)p.active=false;if(p.active&&dist(player.x,player.y,p.x,p.y)<34){p.active=false;if(p.type==='shield')player.shield=clamp(player.shield+32,0,player.maxShield);if(p.type==='rapid')game.rapid=8;if(p.type==='multi')game.multi=7;if(p.type==='surge')player.surgeCd=0;particles(p.x,p.y,p.type==='shield'?'#58f6ff':p.type==='rapid'?'#ffe66d':p.type==='multi'?'#ff4fd8':'#58ff9a',18,4);beep(980,.08,'sine',.03)}}
for(const q of A.particles){q.x+=q.vx*dt;q.y+=q.vy*dt;q.vx*=.985;q.vy*=.985;q.life-=dt/60;if(q.life<=0)q.active=false}for(const r of A.rings){r.r+=((r.max-r.r)*.22+5)*dt;r.life-=dt/60;if(r.life<=0)r.active=false}
for(const k of['shots','hazards','enemies','particles','pickups','rings'])recycle(k);cap('particles',settings.reduceMotion?180:360);
if(!game.queue.length&&!A.enemies.length){waveClearDelay+=dt;if(waveClearDelay>80)setState('upgrade')}updateHud()}
function damagePlayer(n){if(player.inv>0)return;player.shield-=n;player.inv=.65;flash=.22;shake+=settings.reduceMotion?0:9;particles(player.x,player.y,'#ff5b6e',18,5);beep(90,.08,'sawtooth',.04);if(player.shield<=0){game.best=Math.max(game.best,game.score);save.best=game.best;persist();setState('over')}}
function updateHud(){leftHud.textContent=`SCORE ${game.score}`;centerHud.textContent=`WAVE ${game.wave}${game.rapid>0?' · RAPID':''}${game.multi>0?' · x2':''}`;rightHud.textContent=`SHIELD ${Math.ceil(Math.max(0,player.shield))} · BEST ${Math.max(game.best,save.best||0)}`}
function draw(){ctx.save();ctx.clearRect(0,0,W,H);if(shake&&!settings.reduceMotion)ctx.translate(rand(-shake,shake),rand(-shake,shake));const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,settings.highContrast?'#000':'#050713');g.addColorStop(.55,settings.highContrast?'#050505':'#0b1230');g.addColorStop(1,'#02030a');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.strokeStyle=settings.highContrast?'rgba(255,255,255,.16)':'rgba(88,246,255,.08)';for(let x=((performance.now()*.02)%90)-90;x<W;x+=90){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+180,H);ctx.stroke()}for(const s of A.stars){ctx.fillStyle=`rgba(210,250,255,${.2+s.z*.4})`;ctx.fillRect(s.x,s.y,s.r*s.z,s.r*s.z)}ctx.fillStyle='rgba(88,246,255,.08)';ctx.fillRect(0,H-70,W,70);ctx.strokeStyle='rgba(88,246,255,.22)';ctx.beginPath();ctx.moveTo(0,H-70);ctx.lineTo(W,H-70);ctx.stroke();for(const r of A.rings)ring(r);for(const p of A.pickups)pickup(p);for(const b of A.shots)circle(b.x,b.y,b.r,'#baffff','#58f6ff',14);for(const h of A.hazards)circle(h.x,h.y,h.r,'#ff8b98','#ff5b6e',12);for(const e of A.enemies)enemy(e);ship();if(player.upgrade.drone>0){const dx=player.x+Math.cos(droneAngle)*42,dy=player.y+Math.sin(droneAngle)*38;circle(dx,dy,8,'#58ff9a','#58ff9a',16)}for(const q of A.particles){ctx.globalAlpha=clamp(q.life/q.max,0,1);ctx.fillStyle=q.color;ctx.beginPath();ctx.arc(q.x,q.y,q.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}if(flash){ctx.fillStyle=`rgba(255,255,255,${flash*.5})`;ctx.fillRect(0,0,W,H)}ctx.restore();requestAnimationFrame(draw)}
function circle(x,y,r,fill,shadow,blur){ctx.save();ctx.shadowBlur=blur;ctx.shadowColor=shadow;ctx.fillStyle=fill;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.restore()}
function ring(r){ctx.save();ctx.globalAlpha=clamp(r.life/.32,0,1);ctx.strokeStyle=r.color;ctx.shadowBlur=24;ctx.shadowColor=r.color;ctx.lineWidth=4;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();ctx.restore()}
function pickup(p){const c=p.type==='shield'?'#58f6ff':p.type==='rapid'?'#ffe66d':p.type==='multi'?'#ff4fd8':'#58ff9a';ctx.save();ctx.translate(p.x,p.y);ctx.rotate(performance.now()*.002);ctx.shadowBlur=18;ctx.shadowColor=c;ctx.strokeStyle=c;ctx.lineWidth=3;ctx.strokeRect(-10,-10,20,20);ctx.restore()}
function ship(){ctx.save();ctx.translate(player.x,player.y);const flash=player.inv>0&&Math.floor(performance.now()/80)%2;ctx.shadowBlur=flash?25:16;ctx.shadowColor=flash?'#fff':'#58f6ff';ctx.fillStyle=flash?'#fff':'#58f6ff';ctx.beginPath();ctx.moveTo(34,0);ctx.lineTo(-22,-24);ctx.lineTo(-10,0);ctx.lineTo(-22,24);ctx.closePath();ctx.fill();ctx.fillStyle='#ff4fd8';ctx.fillRect(-16,-8,22,16);ctx.fillStyle='#ffe66d';ctx.beginPath();ctx.arc(5,0,6,0,Math.PI*2);ctx.fill();if(player.dash>0){ctx.fillStyle='rgba(88,246,255,.28)';ctx.beginPath();ctx.ellipse(-40,0,30,12,0,0,Math.PI*2);ctx.fill()}ctx.restore()}
function enemy(e){ctx.save();ctx.translate(e.x,e.y);let c={runner:'#ff5b6e',floater:'#ff4fd8',brute:'#7b2cff',sniper:'#ffe66d',shielded:'#58f6ff',splitter:'#ff9b4f',chaser:'#58ff9a',boss:'#ff4fd8'}[e.boss?'boss':e.type];ctx.shadowBlur=18;ctx.shadowColor=c;ctx.fillStyle=c;if(e.boss){ctx.beginPath();for(let i=0;i<8;i++){const a=i*Math.PI/4+e.phase,r=i%2?42:58;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill()}else if(e.type==='runner'||e.type==='chaser'){ctx.beginPath();ctx.moveTo(-22,0);ctx.lineTo(18,-18);ctx.lineTo(26,0);ctx.lineTo(18,18);ctx.closePath();ctx.fill()}else if(e.type==='floater'||e.type==='splitter'){ctx.beginPath();ctx.arc(0,0,e.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#050713';ctx.beginPath();ctx.arc(0,0,e.r*.45,0,Math.PI*2);ctx.fill()}else{ctx.fillRect(-e.r,-e.r*.8,e.r*2,e.r*1.6);ctx.fillStyle='#111';ctx.fillRect(-e.r*.45,-7,e.r*.9,14)}if(e.shield>0){ctx.strokeStyle='#baffff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,e.r+8,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(255,255,255,.86)';ctx.fillRect(-e.r,-e.r-13,e.r*2*(e.hp/e.maxhp),4);ctx.restore()}
function loop(now){const dt=Math.min(2.2,(now-last)/16.666);last=now;update(dt);requestAnimationFrame(loop)}
function dash(){if(player.dashCd>0)return;player.dash=.22+player.upgrade.dash*.025;player.dashCd=Math.max(.55,1.05-player.upgrade.dash*.08);player.inv=Math.max(player.inv,.23);particles(player.x-20,player.y,'#58f6ff',12,5);beep(520,.04,'sawtooth',.02)}
addEventListener('keydown',e=>{const k=e.key.toLowerCase();keys.add(k);if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(k))e.preventDefault();if(k==='shift')dash();if(k==='p'){if(state==='playing')setState('paused');else if(state==='paused')setState('playing')}if(k==='escape'&&state==='playing')setState('paused')});addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));canvas.addEventListener('mousedown',()=>holdingFire=true);addEventListener('mouseup',()=>holdingFire=false);canvas.addEventListener('contextmenu',e=>{e.preventDefault();surge()});

bodyClasses();renderMenu();updateHud();requestAnimationFrame(loop);requestAnimationFrame(draw);
